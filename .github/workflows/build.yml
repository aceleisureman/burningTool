name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win --x64
          - os: macos-latest
            args: --mac --universal
          - os: ubuntu-latest
            args: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 每次构建生成递增版本号 1.0.<构建号>，electron-updater 依赖版本号判断是否有新版
      - name: Set build version
        shell: bash
        run: npm version "1.0.${{ github.run_number }}" --no-git-tag-version

      # electron-builder 直接发布到 GitHub Release（tag v1.0.<构建号>），
      # 同时上传 latest.yml / latest-mac.yml / latest-linux.yml 供应用内自动更新
      - name: Build & publish
        shell: bash
        run: npx vite build && npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
